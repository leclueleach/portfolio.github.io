<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Le Clue — Data & BI Specialist. Turning complexity into clarity.">
  <title>Le Clue — Data & BI Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06090f;
      font-family: 'Outfit', sans-serif;
    }

    /* ── HERO IMAGE ───────────────────────────────────── */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      will-change: transform;
    }

    .hero-bg img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      object-position: center;
      display: block;
      margin: -5%;
    }

    /* ── OVERLAYS ─────────────────────────────────────── */
    /* Left content fade — makes text always readable */
    .overlay-left {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to right,
        rgba(6,9,20,0.92) 0%,
        rgba(6,9,20,0.78) 25%,
        rgba(6,9,20,0.35) 55%,
        rgba(6,9,20,0.0)  75%
      );
    }

    /* Top and bottom fades */
    .overlay-tb {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(6,9,20,0.55) 0%, transparent 12%, transparent 80%, rgba(6,9,20,0.7) 100%);
    }

    /* Subtle vignette edges */
    .overlay-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 80% at 60% 50%, transparent 40%, rgba(6,9,20,0.4) 100%);
    }

    /* ── CANVAS ───────────────────────────────────────── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── NAV ──────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 26px 48px;
      pointer-events: all;
    }

    .nav__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav__mark {
      width: 34px; height: 34px;
      background: rgba(20,184,166,0.9);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .nav__name {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.02em;
    }

    .nav__links {
      margin-left: auto;
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav__link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: rgba(255,255,255,0.42);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    .nav__link:hover  { color: rgba(255,255,255,0.88); }
    .nav__link.active { color: rgba(255,255,255,0.88); }

    /* ── MAIN LAYOUT ──────────────────────────────────── */
    .main {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      pointer-events: none;
      padding: 0 48px;
    }

    /* ── HERO CONTENT ─────────────────────────────────── */
    .hero-content {
      max-width: 580px;
      padding-top: 60px; /* offset for nav */
    }

    .hero-content__hi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.4s;
    }

    .hero-content__heading {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.4rem, 4.5vw, 4rem);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.65s;
    }

    /* Rust underline accent */
    .hero-content__accent {
      display: block;
      width: 52px;
      height: 3px;
      background: #F97316;
      border-radius: 2px;
      margin-top: 18px;
      margin-bottom: 20px;
      opacity: 0;
      animation: expandAccent 0.7s ease forwards;
      animation-delay: 1.1s;
    }

    @keyframes expandAccent {
      from { width: 0; opacity: 0; }
      to   { width: 52px; opacity: 1; }
    }

    .hero-content__sub {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.88rem, 1.3vw, 1rem);
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.9s;
    }

    /* ── CTAs ─────────────────────────────────────────── */
    .hero-content__ctas {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      pointer-events: all;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 1.15s;
    }

    .cta-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      border-radius: 100px;
      background: rgba(20,184,166,0.9);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: 1px solid rgba(20,184,166,0.5);
      backdrop-filter: blur(8px);
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
    }

    .cta-primary:hover {
      background: rgba(45,212,191,0.95);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(20,184,166,0.3);
    }

    .cta-primary .arrow {
      transition: transform 0.25s;
    }

    .cta-primary:hover .arrow {
      transform: translateX(3px);
    }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      padding: 13px 26px;
      border-radius: 100px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.2s;
    }

    .cta-secondary:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    /* ── SCROLL INDICATOR ─────────────────────────────── */
    .scroll-indicator {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 2s;
      pointer-events: none;
    }

    .scroll-indicator__mouse {
      width: 22px; height: 34px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 11px;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    .scroll-indicator__wheel {
      width: 2px; height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 1px;
      animation: scrollWheel 1.8s ease infinite;
    }

    @keyframes scrollWheel {
      0%   { transform: translateY(0); opacity: 1; }
      80%  { transform: translateY(8px); opacity: 0; }
      100% { transform: translateY(0); opacity: 0; }
    }

    .scroll-indicator__text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── AVAILABILITY PILL ────────────────────────────── */
    .avail {
      position: fixed;
      bottom: 36px;
      right: 48px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(6,9,20,0.55);
      border: 1px solid rgba(20,184,166,0.22);
      border-radius: 100px;
      padding: 9px 18px;
      backdrop-filter: blur(12px);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.8s;
    }

    .avail__dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #14B8A6;
      animation: pulseDot 2.5s ease infinite;
    }

    .avail__text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── ANIMATIONS ───────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulseDot {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 900px) {
      .nav { padding: 20px 24px; }
      .nav__links { gap: 20px; }
      .main { padding: 0 24px; }
      .hero-content { max-width: 100%; }
      .avail { right: 24px; bottom: 28px; }
    }

    @media (max-width: 640px) {
      .nav__links { display: none; }
      .hero-content__heading { font-size: clamp(2rem, 10vw, 2.8rem); }
      .hero-content__sub { max-width: 100%; }
      .overlay-left {
        background: linear-gradient(
          to right,
          rgba(6,9,20,0.95) 0%,
          rgba(6,9,20,0.85) 40%,
          rgba(6,9,20,0.55) 75%,
          rgba(6,9,20,0.2)  100%
        );
      }
    }
  </style>
</head>
<body>

  <!-- Background image -->
  <div class="hero-bg" id="heroBg">
    <img src="./assets/img/hero-bg.png" alt="" aria-hidden="true" draggable="false">
  </div>

  <!-- Overlays -->
  <div class="overlay-left"    aria-hidden="true"></div>
  <div class="overlay-tb"      aria-hidden="true"></div>
  <div class="overlay-vignette" aria-hidden="true"></div>

  <!-- Animated canvas effects -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <!-- Nav -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a href="./index.html" class="nav__logo" aria-label="Le Clue — home">
      <div class="nav__mark" aria-hidden="true">LC</div>
      <span class="nav__name">Le Clue</span>
    </a>
    <ul class="nav__links" role="list">
      <li><a href="./index.html"           class="nav__link active" aria-current="page">Home</a></li>
      <li><a href="./pages/about.html"     class="nav__link">About</a></li>
      <li><a href="./pages/portfolio.html" class="nav__link">Portfolio</a></li>
      <li><a href="./pages/cv.html"        class="nav__link">CV</a></li>
      <li><a href="./pages/qa.html"        class="nav__link">Q&amp;A</a></li>
      <li><a href="./pages/contact.html"   class="nav__link">Contact</a></li>
    </ul>
  </nav>

  <!-- Main hero content -->
  <div class="main" role="main">
    <div class="hero-content">
      <div class="hero-content__hi">Hi, I'm Le Clue</div>
      <h1 class="hero-content__heading">
        I turn complex data<br>into decisions that<br>actually matter.
      </h1>
      <span class="hero-content__accent" aria-hidden="true"></span>
      <p class="hero-content__sub">
        Data &amp; BI specialist building reporting pipelines,<br>
        automations and dashboards — remotely, from Cape Town.
      </p>
      <div class="hero-content__ctas">
        <a href="./pages/portfolio.html" class="cta-primary">
          View My Work <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="./pages/about.html" class="cta-secondary">
          About Me
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator" aria-hidden="true">
    <div class="scroll-indicator__mouse">
      <div class="scroll-indicator__wheel"></div>
    </div>
    <span class="scroll-indicator__text">Scroll</span>
  </div>

  <!-- Availability -->
  <!-- <div class="avail" role="status" aria-label="Availability status">
    <div class="avail__dot" aria-hidden="true"></div>
    <span class="avail__text">Open to remote</span>
  </div> -->

  <script>
  (function(){
    const canvas = document.getElementById('fx');
    const ctx    = canvas.getContext('2d');
    const bg     = document.getElementById('heroBg');
    let W, H, t  = 0;
    let mx = 0.5, my = 0.5, tmx = 0.5, tmy = 0.5;

    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /* ── PARALLAX ──────────────────────────────────── */
    document.addEventListener('mousemove', e => {
      mx = e.clientX / W;
      my = e.clientY / H;
    });

    if(window.DeviceOrientationEvent){
      window.addEventListener('deviceorientation', e => {
        if(e.gamma != null){
          mx = Math.max(0, Math.min(1, (e.gamma + 30) / 60));
          my = Math.max(0, Math.min(1, ((e.beta||0) + 20) / 60));
        }
      });
    }

    /* ── FIREFLIES ──────────────────────────────────── */
    const FLIES = Array.from({length: 32}, (_, i) => ({
      // Cluster left side and bottom right to match image
      x:  i < 18 ? 0.01 + Math.random()*0.24 : 0.70 + Math.random()*0.28,
      y:  0.38 + Math.random()*0.50,
      vx: (Math.random()-0.5)*0.00010,
      vy: -0.00003 - Math.random()*0.00007,
      r:  0.6 + Math.random()*1.2,
      phase: Math.random()*Math.PI*2,
      speed: 0.5 + Math.random()*0.9,
      col: Math.random() > 0.25 ? [255,185,70] : [255,130,35],
    }));

    function drawFireflies(){
      FLIES.forEach(f => {
        f.x += f.vx; f.y += f.vy;
        if(f.x < 0)    f.x = 1;
        if(f.x > 1)    f.x = 0;
        if(f.y < 0.28) f.y = 0.88;
        if(f.y > 0.90) f.y = 0.30;

        const blink = (Math.sin(t * f.speed + f.phase) + 1) * 0.5;
        const alpha = blink * 0.8;
        const glow  = blink * 5 + 2;
        const px    = f.x * W;
        const py    = f.y * H;

        const g = ctx.createRadialGradient(px,py,0,px,py,glow*3.5);
        g.addColorStop(0,   `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${alpha*0.55})`);
        g.addColorStop(0.5, `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${alpha*0.15})`);
        g.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(px, py, glow*3.5, 0, Math.PI*2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(px, py, f.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${alpha})`;
        ctx.fill();
      });
    }

    /* ── WATER SHIMMER ──────────────────────────────── */
    function drawWaterShimmer(){
      const waterY = H * 0.60;
      const centreX = W * 0.54;

      for(let i = 0; i < 10; i++){
        const y     = waterY + (i/10) * H * 0.22;
        const wid   = W * (0.03 + (i/10) * 0.16);
        const wave  = Math.sin(t*0.45 + i*0.9) * 2.8;
        const alpha = (0.015 + (i/10)*0.025) * (Math.sin(t*0.28+i)*0.35+0.65);

        ctx.beginPath();
        ctx.ellipse(centreX+wave, y, wid, 1.0, 0, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,200,110,${alpha})`;
        ctx.lineWidth   = 0.7;
        ctx.stroke();
      }
    }

    /* ── SHOOTING STAR ──────────────────────────────── */
    let star = { active:false, timer:0, nextAt: 5+Math.random()*10 };

    function drawShootingStar(){
      star.timer += 0.016;
      if(!star.active && star.timer > star.nextAt){
        star.active = true;
        star.x      = W*(0.52+Math.random()*0.3);
        star.y      = H*(0.02+Math.random()*0.1);
        star.angle  = Math.PI*(0.1+Math.random()*0.08);
        star.len    = W*(0.09+Math.random()*0.07);
        star.life   = 0;
        star.dur    = 0.65+Math.random()*0.35;
      }
      if(star.active){
        star.life += 0.016;
        const p    = star.life/star.dur;
        if(p>=1){ star.active=false; star.timer=0; star.nextAt=8+Math.random()*16; return; }
        const fade = p<0.3 ? p/0.3 : 1-(p-0.3)/0.7;
        const tx   = star.x + Math.cos(star.angle)*star.len*p;
        const ty   = star.y + Math.sin(star.angle)*star.len*p;
        const tail = 0.16;
        const bx   = tx - Math.cos(star.angle)*star.len*tail;
        const by   = ty - Math.sin(star.angle)*star.len*tail;
        const sg   = ctx.createLinearGradient(bx,by,tx,ty);
        sg.addColorStop(0, 'rgba(255,255,255,0)');
        sg.addColorStop(0.5,`rgba(255,235,190,${fade*0.5})`);
        sg.addColorStop(1,  `rgba(255,255,255,${fade})`);
        ctx.beginPath();
        ctx.moveTo(bx,by); ctx.lineTo(tx,ty);
        ctx.strokeStyle = sg;
        ctx.lineWidth   = 1.4;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(tx,ty,1.8,0,Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${fade})`;
        ctx.fill();
      }
    }

    /* ── STARS ──────────────────────────────────────── */
    const STARS = Array.from({length:55}, ()=>({
      x: Math.random(), y: Math.random()*0.38,
      r: 0.25+Math.random()*0.75,
      phase: Math.random()*Math.PI*2,
      speed: 0.25+Math.random()*0.5,
    }));

    function drawStars(){
      STARS.forEach(s=>{
        const tw    = (Math.sin(t*s.speed+s.phase)+1)*0.5;
        const alpha = 0.08 + tw*0.45;
        ctx.beginPath();
        ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
      });
    }

    /* ── DRAW LOOP ──────────────────────────────────── */
    function draw(){
      t += 0.016;
      tmx += (mx-tmx)*0.035;
      tmy += (my-tmy)*0.035;
      const ox = (tmx-0.5)*-20;
      const oy = (tmy-0.5)*-12;
      bg.style.transform = `translate(${ox}px,${oy}px)`;

      ctx.clearRect(0,0,W,H);
      drawStars();
      drawShootingStar();
      drawFireflies();
      drawWaterShimmer();
      requestAnimationFrame(draw);
    }

    draw();
  })();
  </script>

</body>
</html>
